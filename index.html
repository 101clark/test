<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Document to LaTeX</title>
  <!-- latex.js for full LaTeX rendering -->
  <script src="https://cdn.jsdelivr.net/npm/latex.js/dist/latex.min.js"></script>
  <style>
    body { font-family: Arial, sans-serif; margin: 40px; }
    h1 { color: #333; }
    select, input, button { margin: 10px 5px; padding: 8px; }
    textarea { width: 100%; margin-top: 20px; }
    #preview { border: 1px solid #ccc; padding: 20px; margin-top: 20px; }
    .buttons { margin-top: 10px; }
  </style>
</head>
<body>
  <h1>Document to LaTeX</h1>

  <label for="layout">Choose Layout:</label>
  <select id="layout">
    <option value="article">Article</option>
    <option value="report">Report</option>
    <option value="book">Book</option>
    <option value="twocolumn">Two Column</option>
    <option value="beamer">Beamer Presentation</option>
  </select>

  <br><br>
  <input type="file" id="fileUpload" />
  <button onclick="uploadFile()">Convert</button>

  <h2>LaTeX Output</h2>
  <textarea id="latexOutput" rows="20" cols="80"></textarea>
  <div class="buttons">
    <button onclick="copyLatex()">Copy to Clipboard</button>
    <button onclick="downloadLatex()">Download .tex</button>
  </div>

  <h2>Preview</h2>
  <div id="preview">Rendered LaTeX preview will appear here...</div>

  <script>
    let uploadedFileName = "document.txt";

    function arrayBufferToBase64(buffer) {
      let binary = '';
      const bytes = new Uint8Array(buffer);
      const len = bytes.byteLength;
      for (let i = 0; i < len; i++) {
        binary += String.fromCharCode(bytes[i]);
      }
      return window.btoa(binary);
    }

    async function uploadFile() {
      const file = document.getElementById('fileUpload').files[0];
      const layout = document.getElementById('layout').value;

      if (!file) {
        alert("Please upload a document first.");
        return;
      }
      uploadedFileName = file.name;

      const reader = new FileReader();
      reader.onload = async function(e) {
        const base64Content = arrayBufferToBase64(e.target.result);

        try {
          const response = await fetch(
            "https://rpypagda25.execute-api.us-east-1.amazonaws.com/convertToLatex/convertToLatex?layout=" + layout,
            {
              method: "POST",
              headers: { "Content-Type": "text/plain" },
              body: base64Content
            }
          );

          const result = await response.json();
          let latex = result.latex || result.answer || "";

          // Directly use LaTeX since Lambda now returns only valid code
          document.getElementById('latexOutput').value = latex;

          // Render with latex.js
          try {
            const generator = new latexjs.HtmlGenerator({ hyphenate: false });
            latexjs.parse(latex, { generator });
            document.getElementById('preview').innerHTML = generator.domFragment().innerHTML;
          } catch (renderErr) {
            console.error("Render error:", renderErr);
            document.getElementById('preview').innerText = "Preview failed. Please copy LaTeX into Overleaf or pdflatex.";
          }
        } catch (err) {
          console.error("Error calling Lambda:", err);
          alert("Failed to convert document.");
        }
      };
      reader.readAsArrayBuffer(file);
    }

    function copyLatex() {
      const latex = document.getElementById('latexOutput').value;
      navigator.clipboard.writeText(latex).then(() => {
        alert("LaTeX copied to clipboard!");
      });
    }

    function downloadLatex() {
      const latex = document.getElementById('latexOutput').value;
      let baseName = uploadedFileName.split('.').slice(0, -1).join('.') || uploadedFileName;
      const texFileName = baseName + ".tex";

      const blob = new Blob([latex], { type: "text/plain" });
      const link = document.createElement("a");
      link.href = URL.createObjectURL(blob);
      link.download = texFileName;
      link.click();
    }
  </script>
</body>
</html>
