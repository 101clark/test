<!DOCTYPE html>
<html>
<head>
  <title>Lambda Test</title>
</head>
<body>
  <h1>Lambda Test App</h1>
  <input type="text" id="questionInput" placeholder="Enter your question" />
  <button id="callLambda">Ask Lambda</button>
  <pre id="response"></pre> <!-- use <pre> for nicer formatting -->

  <script>
    document.getElementById("callLambda").addEventListener("click", async () => {
      const question = document.getElementById("questionInput").value.trim();

      if (!question) {
        document.getElementById("response").innerText = "Error: Please enter a question.";
        return;
      }

      try {
        const res = await fetch(
          "https://a4tr6kav92.execute-api.us-east-1.amazonaws.com/testAPIStage/callHelloLambda?question=" + encodeURIComponent(question)
        );

        // First parse the outer Lambda response
        const outer = await res.json();

        // Then parse the inner body string
        const data = JSON.parse(outer.body);

        if (data.error) {
          document.getElementById("response").innerText = "Error: " + data.error;
        } else {
          document.getElementById("response").innerText =
            `Q: ${data.question}\nA: ${data.answer}\n(${data.timestamp})`;
        }
      } catch (err) {
        document.getElementById("response").innerText = "Error calling Lambda: " + err;
      }
    });
  </script>
</body>
</html>
