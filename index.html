<!DOCTYPE html>
<html>
<head>
  <title>Lambda Test</title>
</head>
<body>
  <h1>Lambda Test App</h1>
  <button id="callLambda">Call Lambda</button>
  <p id="response"></p>

  <script>
    document.getElementById("callLambda").addEventListener("click", async () => {
      try {
        const res = await fetch("YOUR_API_GATEWAY_URL");
        const data = await res.text();
        document.getElementById("response").innerText = data;
      } catch (err) {
        document.getElementById("response").innerText = "Error calling Lambda: " + err;
      }
    });
  </script>
</body>
</html>
