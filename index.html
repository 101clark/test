<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Document to LaTeX</title>
  <style>
    body { font-family: Arial, sans-serif; margin: 40px; }
    h1 { color: #333; }
    select, input, button { margin: 10px 5px; padding: 8px; }
    textarea { width: 100%; margin-top: 20px; }
    .buttons { margin-top: 10px; }
    #status { margin-top: 10px; font-style: italic; color: #555; }
  </style>
</head>
<body>
  <h1>Document to LaTeX</h1>

  <label for="layout">Choose Layout:</label>
  <select id="layout">
    <option value="article">Article</option>
    <option value="report">Report</option>
    <option value="book">Book</option>
    <option value="twocolumn">Two Column</option>
    <option value="beamer">Beamer Presentation</option>
  </select>

  <br><br>
  <input type="file" id="fileUpload" />
  <button id="convertBtn" onclick="uploadFile()">Convert</button>

  <h2>LaTeX Output</h2>
  <textarea id="latexOutput" rows="20" cols="80"></textarea>
  <div class="buttons">
    <button id="copyBtn" onclick="copyLatex()">Copy to Clipboard</button>
    <button id="downloadBtn" onclick="downloadLatex()">Download .tex</button>
  </div>

  <div id="status"></div>

  <script>
    let uploadedFileName = "document.txt";

    function setButtonsEnabled(enabled) {
      document.getElementById("convertBtn").disabled = !enabled;
      document.getElementById("copyBtn").disabled = !enabled;
      document.getElementById("downloadBtn").disabled = !enabled;
      document.getElementById("fileUpload").disabled = !enabled;
    }

    // Safe base64 encoder for Unicode strings
    function toBase64Unicode(str) {
      const utf8Bytes = new TextEncoder().encode(str); // convert to bytes
      let binary = "";
      utf8Bytes.forEach(b => binary += String.fromCharCode(b));
      return btoa(binary); // base64 encode
    }

    async function uploadFile() {
      const file = document.getElementById('fileUpload').files[0];
      const layout = document.getElementById('layout').value;

      if (!file) {
        alert("Please upload a document first.");
        return;
      }
      uploadedFileName = file.name;

      setButtonsEnabled(false);
      document.getElementById("status").innerText = "Converting… please wait.";
      document.getElementById('latexOutput').value = "";

      const reader = new FileReader();
      reader.onload = async function(e) {
        const textContent = new TextDecoder().decode(e.target.result);

        // Split into chunks
        const MAX_CHARS = 100000;
        const chunks = [];
        for (let i = 0; i < textContent.length; i += MAX_CHARS) {
          chunks.push(textContent.slice(i, i + MAX_CHARS));
        }

        console.log(`Total chunks: ${chunks.length}`);

        let latexParts = [];

        for (let idx = 0; idx < chunks.length; idx++) {
          console.log(`Sending chunk ${idx+1}/${chunks.length}, length=${chunks[idx].length}`);
          document.getElementById("status").innerText = `Processing chunk ${idx+1}/${chunks.length}…`;

          const base64Content = toBase64Unicode(chunks[idx]);

          try {
            const response = await fetch(
              `https://rpypagda25.execute-api.us-east-1.amazonaws.com/convertToLatex/convertToLatex?layout=${layout}&chunkIndex=${idx}`,
              {
                method: "POST",
                headers: { "Content-Type": "text/plain" },
                body: base64Content
              }
            );

            const result = await response.json();
            latexParts.push(result.latexChunk || "");
          } catch (err) {
            console.error("Error calling Lambda:", err);
            alert("Failed to convert document.");
            document.getElementById("status").innerText = "Conversion failed.";
            setButtonsEnabled(true);
            return;
          }
        }

        // Wrap final LaTeX
        const latex = `
\\documentclass[${layout}]{article}
\\usepackage[utf8]{inputenc}
\\begin{document}
${latexParts.join("\n\n")}
\\end{document}
        `;

        document.getElementById('latexOutput').value = latex;
        document.getElementById("status").innerText = "Conversion complete.";
        setButtonsEnabled(true);
      };
      reader.readAsArrayBuffer(file);
    }

    function copyLatex() {
      const latex = document.getElementById('latexOutput').value;
      navigator.clipboard.writeText(latex).then(() => {
        alert("LaTeX copied to clipboard!");
      });
    }

    function downloadLatex() {
      const latex = document.getElementById('latexOutput').value;
      let baseName = uploadedFileName.split('.').slice(0, -1).join('.') || uploadedFileName;
      const texFileName = baseName + ".tex";

      const blob = new Blob([latex], { type: "text/plain" });
      const link = document.createElement("a");
      link.href = URL.createObjectURL(blob);
      link.download = texFileName;
      link.click();
    }
  </script>
</body>
</html>
